# =====================================================
# 机票监控配置文件
# =====================================================

# 监控任务列表（可配置多条）
watch_list:
  - id: trip_001
    label: "暑假京沪往返"
    outbound:
      origin: PEK          # 出发机场 IATA 代码
      destination: SHA      # 目的地机场 IATA 代码
      date: "2026-07-15"   # 出发日期 YYYY-MM-DD
    return:
      origin: SHA
      destination: PEK
      date: "2026-07-22"
    trip_type: roundtrip   # roundtrip | oneway
    cabin: economy         # economy | business | first
    passengers: 1
    airlines:              # 留空表示监控所有航司
      - CA                 # 国航
      - MU                 # 东航
      - CZ                 # 南航
      - CX                 # 国泰
    price_threshold: 1200  # 单程含税价格上限（元），超过不推送
    currency: CNY

  - id: trip_002
    label: "国庆上海→成都单程"
    outbound:
      origin: PVG
      destination: CTU
      date: "2026-10-01"
    trip_type: oneway
    cabin: economy
    passengers: 1
    airlines: []           # 所有航司
    price_threshold: 800
    currency: CNY

# 搜索数据源（启用的会并发查询）
sources:
  ctrip:
    enabled: true
    api_key: ""            # 携程开放平台 API Key（留空则用网页抓取）
  qunar:
    enabled: true
    api_key: ""
  fliggy:
    enabled: true
    api_key: ""
  airline_direct:
    enabled: true          # 直连各航司官网
    carriers:
      CA: "https://www.airchina.com.cn"
      MU: "https://www.ceair.com"
      CZ: "https://www.csair.com"
      CX: "https://www.cathaypacific.com"

# 调度设置
scheduler:
  interval_minutes: 15    # 轮询间隔（分钟）
  active_hours:           # 仅在此时段内运行（24 小时制）
    start: 7
    end: 23
  timezone: "Asia/Shanghai"
  jitter_seconds: 30      # 每次请求加随机抖动，避免被封

# 通知渠道（可同时启用多个）
notifiers:
  bark:
    enabled: true
    device_key: ""         # Bark App 的 Device Key
    server: "https://api.day.app"
    sound: "telegraph"
    icon: "https://cdn-icons-png.flaticon.com/512/5068/5068650.png"
  pushplus:
    enabled: false
    token: ""              # PushPlus Token（微信推送）
    template: "html"
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: ""
    password: ""
    to: ""
  telegram:
    enabled: false
    token: ""              # BotFather 给的 Bot Token
    chat_id: ""            # 你的 Chat ID
  webhook:
    enabled: false
    url: ""                # 自定义 Webhook（企业微信、飞书等）
    method: POST
    headers:
      Content-Type: "application/json"

# 存储
storage:
  db_path: "data/flights.db"
  keep_history_days: 30   # 保留历史价格天数

# 代理（可选，避免被封 IP）
proxy:
  enabled: false
  http: "http://127.0.0.1:7890"
  https: "http://127.0.0.1:7890"

# 日志
logging:
  level: INFO             # DEBUG | INFO | WARNING | ERROR
  file: "logs/monitor.log"
  max_bytes: 10485760     # 10 MB
  backup_count: 5
